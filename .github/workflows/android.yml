name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create APK Placeholder
        run: |
          mkdir apk
          echo "ZMMH APP" > apk/readme.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: apk
